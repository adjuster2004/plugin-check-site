<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
		/* Настройки для всего документа */
		html, body {
			margin: 0;
			padding: 0;
			/* Убираем фиксированную высоту, чтобы она подстраивалась под контент */
			height: auto; 
			font-family: sans-serif;
			background: #f4f5f7;
		}

		body {
			/* Делаем окно шире */
			width: 500px; 
			padding: 15px;
			box-sizing: border-box;
			/* Ограничиваем максимальную высоту по лимитам Chrome (600px) */
			max-height: 600px;
			display: flex;
			flex-direction: column;
		}

		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 12px;
			flex-shrink: 0;
		}

		.header h3 { margin: 0; font-size: 18px; color: #172b4d; }
		
		.settings-link { 
			cursor: pointer; 
			color: #0052cc; 
			font-size: 13px; 
			text-decoration: none; 
		}

		button { 
			width: 100%; 
			padding: 12px; 
			background: #0052cc; 
			color: white; 
			border: none; 
			border-radius: 4px; 
			cursor: pointer; 
			font-size: 14px; 
			font-weight: bold;
			flex-shrink: 0;
		}

		/* Контейнер результатов */
		#results { 
			margin-top: 15px;
			/* Разрешаем внутреннюю прокрутку, если доменов ОЧЕНЬ много */
			overflow-y: auto; 
			/* Плавное расширение */
			flex-grow: 1;
		}

		.result-item { 
			margin-bottom: 10px; 
			padding: 12px; 
			border-radius: 6px; 
			border: 1px solid #dfe1e6; 
			background: white; 
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.domain-info { display: flex; flex-direction: column; gap: 4px; }
		.domain-name { font-weight: bold; font-size: 14px; color: #172b4d; }
		.status-line { font-size: 12px; color: #42526e; }

		/* Цвета полосок */
		.ok { border-left: 5px solid #36b37e; }
		.warning { border-left: 5px solid #ffab00; }
		.error { border-left: 5px solid #ff5630; }

		.loader { display: none; text-align: center; margin: 15px 0; font-size: 13px; color: #6b778c; }
	</style>
</head>
<body>
    <div class="header">
        <h3>Site Monitor</h3>
        <a id="openSettings" class="settings-link">⚙️ Настройки</a>
    </div>

    <button id="checkBtn">Проверить сейчас</button>
    <div id="loader" class="loader">Связь с Docker-API...</div>
    <div id="results"></div>

    <script src="popup.js"></script>
</body>
</html>
