<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
		/* Базовые настройки окна */
		html, body {
			margin: 0;
			padding: 0;
			font-family: sans-serif;
			background: #f4f5f7;
		}

		body {
			width: 500px; /* Комфортная ширина */
			/* Окно будет подстраиваться под контент (height: auto) */
			min-height: 100px; /* Минимальная высота, чтобы не выглядело сплющенным */
			padding: 15px;
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
		}

		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 12px;
			flex-shrink: 0;
		}

		.header h3 { margin: 0; font-size: 18px; color: #172b4d; }
		
		.settings-link { 
			cursor: pointer; 
			color: #0052cc; 
			font-size: 13px; 
			text-decoration: none; 
		}

		button { 
			width: 100%; 
			padding: 12px; 
			background: #0052cc; 
			color: white; 
			border: none; 
			border-radius: 4px; 
			cursor: pointer; 
			font-size: 14px; 
			font-weight: bold;
			flex-shrink: 0;
		}

		/* Главная магия "резиновости" происходит здесь */
		#results { 
			margin-top: 15px;
			/* Если сайтов много, блок перестанет расти на 480px и появится скролл. 
			   Вместе с кнопкой и шапкой это даст те самые ~600px (лимит Chrome) */
			max-height: 480px; 
			overflow-y: auto; 
			/* Убираем жесткую высоту, чтобы блок мог сжиматься */
			height: auto; 
		}

		/* Настройка скроллбара (чтобы он был красивым и не съедал место) */
		#results::-webkit-scrollbar { width: 6px; }
		#results::-webkit-scrollbar-track { background: transparent; }
		#results::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 3px; }

		.result-item { 
			margin-bottom: 10px; 
			padding: 12px; 
			border-radius: 6px; 
			border: 1px solid #dfe1e6; 
			background: white; 
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.ok { border-left: 5px solid #36b37e; }
		.error { border-left: 5px solid #ff5630; }

		.loader { display: none; text-align: center; margin: 15px 0; font-size: 13px; color: #6b778c; }
</style>
</head>
<body>
    <div class="header">
        <h3>Site Monitor</h3>
        <a id="openSettings" class="settings-link">⚙️ Настройки</a>
    </div>

    <button id="checkBtn">Проверить сейчас</button>
    <div id="loader" class="loader">Связь с Docker-API...</div>
    <div id="results"></div>

    <script src="popup.js"></script>
</body>
</html>
