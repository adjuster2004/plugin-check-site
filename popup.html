<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 10px; width: 320px; margin: 0; background: #f4f5f7; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header h3 { margin: 0; font-size: 16px; color: #172b4d; }
        
        /* Ссылка на настройки */
        .settings-link { cursor: pointer; color: #0052cc; font-size: 12px; text-decoration: none; display: flex; align-items: center; }
        .settings-link:hover { text-decoration: underline; }

        button { width: 100%; padding: 10px; background: #0052cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background: #0047b3; }
        button:disabled { background: #a5bdec; }
        
        #results { margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .result-item { margin-bottom: 8px; padding: 10px; border-radius: 4px; border: 1px solid #dfe1e6; background: white; font-size: 13px; }
        .ok { border-left: 4px solid #36b37e; }
        .warning { border-left: 4px solid #ffab00; }
        .error { border-left: 4px solid #ff5630; }
        
        .loader { display: none; text-align: center; margin: 15px 0; font-size: 12px; color: #6b778c; }
    </style>
</head>
<body>
    <div class="header">
        <h3>SSL Monitor</h3>
        <a id="openSettings" class="settings-link">⚙️ Настройки</a>
    </div>

    <button id="checkBtn">Проверить сейчас</button>
    <div id="loader" class="loader">Связь с Docker-API...</div>
    <div id="results"></div>

    <script src="popup.js"></script>
</body>
</html>
